# =============================================================================
# netlify.toml — Configuration pour l'hébergement sur Netlify
# Ce fichier est ignoré si vous hébergez sur GitHub Pages : aucun risque.
# =============================================================================

[build]
  # Site statique : aucune compilation nécessaire, on publie le dossier tel quel.
  publish = "."

# En-têtes de sécurité de base (facultatif mais recommandé)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
